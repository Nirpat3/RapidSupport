<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
    <title>Support Board - Customer Support Platform</title>
    <meta name="description" content="Professional customer support platform with real-time chat, conversation management, and admin dashboard for seamless customer service." />
    
    <!-- PWA Meta Tags -->
    <meta name="application-name" content="Support Board" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Support Board" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="msapplication-TileColor" content="#6366f1" />
    
    <!-- PWA Manifest - dynamically set based on org parameter -->
    <link rel="manifest" href="/manifest.json" id="pwa-manifest" />
    <script>
      // Update manifest link with org parameter if present
      (function() {
        var params = new URLSearchParams(window.location.search);
        var org = params.get('org');
        if (org) {
          var manifestLink = document.getElementById('pwa-manifest');
          if (manifestLink) {
            manifestLink.href = '/manifest.json?org=' + encodeURIComponent(org);
          }
          // Also update theme-color meta tag dynamically
          fetch('/api/organizations/' + encodeURIComponent(org) + '/branding')
            .then(function(res) { return res.json(); })
            .then(function(branding) {
              if (branding.primaryColor) {
                var themeColor = document.querySelector('meta[name="theme-color"]');
                if (themeColor) themeColor.content = branding.primaryColor;
                var tileColor = document.querySelector('meta[name="msapplication-TileColor"]');
                if (tileColor) tileColor.content = branding.primaryColor;
              }
              if (branding.name) {
                var appName = document.querySelector('meta[name="application-name"]');
                if (appName) appName.content = branding.name;
                var appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
                if (appleTitle) appleTitle.content = branding.name;
              }
            })
            .catch(function() {});
        }
      })();
    </script>
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fira+Code:wght@300..700&family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Oxanium:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Space+Grotesk:wght@300..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
